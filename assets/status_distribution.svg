<svg xmlns="http://www.w3.org/2000/svg" width="760" height="440" viewBox="0 0 760 440" role="img" aria-labelledby="title desc">
  <title id="title">Customer Support Ticket Status Distribution</title>
  <desc id="desc">Bar chart showing Closed, Resolved, In progress, and Open ticket percentages.</desc>
  <rect width="760" height="440" fill="#f8fafc"/>
  <text x="40" y="55" font-family="Arial, sans-serif" font-size="25" font-weight="700" fill="#111827">Ticket Status Distribution</text>
  <text x="40" y="85" font-family="Arial, sans-serif" font-size="14" fill="#4b5563">Public-safe summary from 2,330 support tickets</text>
  <text x="40" y="150" font-family="Arial, sans-serif" font-size="15" fill="#111827">Closed</text>
  <rect x="150" y="128" width="430" height="34" fill="#2563eb" rx="4"/>
  <text x="600" y="151" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#111827">50.34%</text>
  <text x="40" y="210" font-family="Arial, sans-serif" font-size="15" fill="#111827">Resolved</text>
  <rect x="150" y="188" width="271" height="34" fill="#0f766e" rx="4"/>
  <text x="600" y="211" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#111827">31.72%</text>
  <text x="40" y="270" font-family="Arial, sans-serif" font-size="15" fill="#111827">In progress</text>
  <rect x="150" y="248" width="147" height="34" fill="#f59e0b" rx="4"/>
  <text x="600" y="271" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#111827">17.17%</text>
  <text x="40" y="330" font-family="Arial, sans-serif" font-size="15" fill="#111827">Open</text>
  <rect x="150" y="308" width="7" height="34" fill="#dc2626" rx="4"/>
  <text x="600" y="331" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#111827">0.77%</text>
  <text x="40" y="395" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">Direct ticket IDs and agent names are excluded from public evidence.</text>
</svg>
